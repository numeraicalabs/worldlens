<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WorldLens Globe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#03060f;overflow:hidden;font-family:'Space Mono',monospace}
#wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
canvas{display:block}
#loader{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:#03060f;z-index:10;transition:opacity .8s}
#loader.gone{opacity:0;pointer-events:none}
.ld-ring{width:48px;height:48px;border:2px solid rgba(255,143,0,.15);
  border-top-color:#ff8f00;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-txt{font-size:10px;color:rgba(255,143,0,.6);letter-spacing:.15em}
#stats-overlay{position:absolute;bottom:12px;left:12px;display:flex;gap:8px;flex-wrap:wrap;pointer-events:none}
.stat-chip{background:rgba(3,6,15,.82);border:1px solid rgba(255,143,0,.18);
  border-radius:6px;padding:4px 10px;font-size:9px;color:rgba(255,200,100,.85);
  letter-spacing:.06em;backdrop-filter:blur(6px)}
.stat-chip span{color:#ff8f00;font-weight:700}
#pause-btn{position:absolute;top:10px;right:10px;background:rgba(3,6,15,.7);
  border:1px solid rgba(255,143,0,.25);border-radius:6px;color:rgba(255,200,100,.8);
  font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit}
#pause-btn:hover{background:rgba(255,143,0,.12)}
</style>
</head>
<body>
<div id="wrap">
  <div id="loader"><div class="ld-ring"></div><div class="ld-txt">INITIALISING GLOBE</div></div>
  <canvas id="c"></canvas>
  <div id="stats-overlay">
    <div class="stat-chip">Events 24h <span id="s-ev">—</span></div>
    <div class="stat-chip">Critical <span id="s-cr">—</span></div>
    <div class="stat-chip">Risk <span id="s-ri">—</span></div>
  </div>
  <button id="pause-btn" onclick="togglePause()">⏸</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
  crossorigin="anonymous"></script>
<script>
'use strict';
/* ── Config ── */
var ROT = 0.0008, rotating = true, paused = false;
var scene, camera, renderer, globe, mGroup, gGroup, rGroup;
var W, H;

function togglePause(){ paused = !paused; document.getElementById('pause-btn').textContent = paused ? '▶' : '⏸'; }

/* ── Init ── */
function init(){
  var wrap = document.getElementById('wrap');
  W = wrap.clientWidth || window.innerWidth;
  H = wrap.clientHeight || window.innerHeight;

  scene    = new THREE.Scene();
  camera   = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
  camera.position.set(0, 0, 2.75);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);

  /* Stars */
  var starGeo = new THREE.BufferGeometry();
  var starPos = new Float32Array(5000*3);
  for(var i=0;i<starPos.length;i++) starPos[i] = (Math.random()-0.5)*200;
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:0.07,transparent:true,opacity:0.6})));

  /* Globe — procedural texture (no external fetch = no CORS) */
  var geo  = new THREE.SphereGeometry(1, 64, 64);
  var mat  = new THREE.MeshPhongMaterial({
    color:     0x0a1628,
    emissive:  new THREE.Color(0x071020),
    shininess: 15,
    transparent: true,
    opacity: 1,
  });
  globe = new THREE.Mesh(geo, mat);
  scene.add(globe);

  /* Load texture asynchronously — graceful fallback if blocked */
  var loader = new THREE.TextureLoader();
  loader.crossOrigin = 'anonymous';
  loader.load(
    'https://unpkg.com/three@0.128.0/examples/textures/planets/earth_atmos_2048.jpg',
    function(tex){ mat.map = tex; mat.needsUpdate = true; },
    undefined,
    function(){ /* fail silently — globe still visible with solid color */ }
  );

  /* Atmosphere glow */
  var atmGeo = new THREE.SphereGeometry(1.02, 64, 64);
  var atmMat = new THREE.MeshPhongMaterial({
    color:0x1a4a8a, emissive:new THREE.Color(0x0d2a50),
    transparent:true, opacity:0.18, side:THREE.FrontSide
  });
  scene.add(new THREE.Mesh(atmGeo, atmMat));

  /* Groups for markers */
  mGroup = new THREE.Group(); gGroup = new THREE.Group(); rGroup = new THREE.Group();
  scene.add(mGroup); scene.add(gGroup); scene.add(rGroup);

  /* Lights */
  scene.add(new THREE.AmbientLight(0x223355, 0.7));
  var sun = new THREE.DirectionalLight(0x6699ff, 1.3);
  sun.position.set(5,3,5); scene.add(sun);

  /* Resize */
  window.addEventListener('resize', function(){
    W = wrap.clientWidth || window.innerWidth;
    H = wrap.clientHeight || window.innerHeight;
    camera.aspect = W/H;
    camera.updateProjectionMatrix();
    renderer.setSize(W,H);
  });

  /* Remove loader after short delay */
  setTimeout(function(){
    var ld = document.getElementById('loader');
    if(ld) ld.classList.add('gone');
  }, 800);

  /* Start loop */
  loop();
}

/* ── Render loop — visibility-aware to avoid rAF violations ── */
var _raf = null;
function loop(){
  _raf = requestAnimationFrame(loop);
  if(paused) return;
  /* Only render if document is visible */
  if(document.hidden) return;
  var t = Date.now() / 1000;
  if(rotating && globe){
    globe.rotation.y     += ROT;
    mGroup.rotation.y    += ROT;
    gGroup.rotation.y    += ROT;
    rGroup.rotation.y    += ROT;
  }
  /* Animate glow beacons */
  gGroup.children.forEach(function(m){
    var b = m.userData.b||0;
    m.material.opacity = 0.08 + 0.07*Math.sin(t*2+b);
    m.scale.setScalar(1 + 0.2*Math.sin(t*1.5+b));
  });
  rGroup.children.forEach(function(m){
    if(!m.userData.reg) return;
    var b=m.userData.b||0, s=m.userData.s||1;
    m.scale.setScalar(s*(1+0.15*Math.sin(t*1.8+b)));
  });
  renderer.render(scene, camera);
}

/* Pause rAF when tab is hidden */
document.addEventListener('visibilitychange', function(){
  if(document.hidden){
    if(_raf){ cancelAnimationFrame(_raf); _raf=null; }
  } else {
    if(!_raf) loop();
  }
});

/* ── Geo helpers ── */
function latLonToVec3(lat, lon, r){
  var phi   = (90-lat)*Math.PI/180;
  var theta = (lon+180)*Math.PI/180;
  return new THREE.Vector3(
    -r*Math.sin(phi)*Math.cos(theta),
     r*Math.cos(phi),
     r*Math.sin(phi)*Math.sin(theta)
  );
}

var CAT_COLORS = {
  GEOPOLITICS:'#ef4444', CONFLICT:'#f97316', ECONOMICS:'#3b82f6',
  FINANCE:'#8b5cf6', TECHNOLOGY:'#06b6d4', ENERGY:'#f59e0b',
  HUMANITARIAN:'#10b981', DISASTER:'#ef4444', default:'#94a3b8'
};

/* ── API fetch (no auth needed — globe data is public) ── */
function apiFetch(url, cb){
  fetch(url)
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(d){ if(d) cb(d); })
    .catch(function(){});
}

/* ── Build event markers ── */
function buildMarkers(data){
  while(mGroup.children.length) mGroup.remove(mGroup.children[0]);
  var points = Array.isArray(data) ? data : (data.points || []);
  points.slice(0,120).forEach(function(p){
    var pos = latLonToVec3(p.latitude||p.lat||0, p.longitude||p.lon||0, 1.01);
    var sev = p.severity||5;
    var col = new THREE.Color(CAT_COLORS[p.category] || CAT_COLORS.default);
    var size = 0.008 + sev * 0.003;
    var geo = new THREE.SphereGeometry(size, 6, 6);
    var mat = new THREE.MeshBasicMaterial({color: col, transparent:true, opacity:0.85});
    var mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    mGroup.add(mesh);
  });
}

/* ── Build region beacons ── */
var REGION_COORDS = {
  'North America':  [40, -100], 'Europe':       [50, 10],
  'Asia Pacific':   [35, 110],  'Middle East':  [25, 45],
  'Africa':         [0, 20],    'Latin America':[-10,-60],
  'South Asia':     [20, 78],   'Central Asia': [45, 65],
  'East Asia':      [35, 115],
};
function buildRegionBeacons(data){
  while(rGroup.children.length) rGroup.remove(rGroup.children[0]);
  var regions = Array.isArray(data) ? data : (data.regions || []);
  regions.forEach(function(reg, i){
    var coords = REGION_COORDS[reg.name || reg.region] || reg.center || [0, i*40];
    var pos    = latLonToVec3(coords[0], coords[1], 1.01);
    var risk   = reg.risk || reg.risk_score || 5;
    var col    = new THREE.Color(risk > 7 ? '#ef4444' : risk > 5 ? '#f59e0b' : '#10b981');
    var s      = 0.015 + risk * 0.004;
    var geo    = new THREE.SphereGeometry(s, 8, 8);
    var mat    = new THREE.MeshBasicMaterial({color: col, transparent:true, opacity:0.7});
    var mesh   = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    mesh.userData.reg = true;
    mesh.userData.b   = i * 1.1;
    mesh.userData.s   = s;
    rGroup.add(mesh);

    /* Glow ring */
    var rg = new THREE.RingGeometry(s*1.2, s*2, 16);
    var rm = new THREE.MeshBasicMaterial({color:col, transparent:true, opacity:0.12, side:THREE.DoubleSide});
    var ring = new THREE.Mesh(rg, rm);
    ring.position.copy(pos);
    ring.lookAt(new THREE.Vector3(0,0,0));
    ring.userData.b = i * 1.1;
    gGroup.add(ring);
  });
}

/* ── Render stats ── */
function renderStats(d){
  var el = function(id){ return document.getElementById(id); };
  if(el('s-ev')) el('s-ev').textContent = d.events_24h || d.last_24h || 0;
  if(el('s-cr')) el('s-cr').textContent = d.high_impact || d.high_impact_24h || 0;
  if(el('s-ri')) el('s-ri').textContent = (d.avg_severity || d.global_risk_index || 0).toFixed(0);
}

/* ── Boot sequence ── */
window.addEventListener('load', function(){
  try {
    init();
  } catch(e) {
    console.error('Globe init error:', e);
    var ld = document.getElementById('loader');
    if(ld){ ld.innerHTML = '<div style="color:#f59e0b;font-size:11px;text-align:center">Globe requires WebGL</div>'; }
    return;
  }

  /* Fetch data with staggered delays to avoid burst */
  setTimeout(function(){ apiFetch('/api/globe/heatmap-points', buildMarkers); }, 500);
  setTimeout(function(){ apiFetch('/api/globe/regions', function(d){ buildRegionBeacons(d); }); }, 800);
  setTimeout(function(){ apiFetch('/api/globe/stats', renderStats); }, 1100);

  /* Refresh intervals — staggered, visibility-aware */
  setInterval(function(){
    if(!document.hidden) apiFetch('/api/globe/heatmap-points', buildMarkers);
  }, 30000);
  setInterval(function(){
    if(!document.hidden) apiFetch('/api/globe/regions', function(d){ buildRegionBeacons(d); });
  }, 60000);
  setInterval(function(){
    if(!document.hidden) apiFetch('/api/globe/stats', renderStats);
  }, 15000);
});
</script>
</body>
</html>
