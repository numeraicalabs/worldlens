<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WorldLens — Live Global Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03060f;
  --surface:rgba(255,255,255,.03);
  --border:rgba(255,143,0,.09);
  --border-h:rgba(255,143,0,.2);
  --corona:#FF8F00;
  --ember:#DD2C00;
  --core:#FFAB00;
  --t1:#E8E0D4;
  --t2:rgba(255,255,255,.55);
  --t3:rgba(255,143,0,.5);
  --sans:'Syne',system-ui,sans-serif;
  --mono:'Space Mono',monospace;
  --re:#EF4444;--am:#F59E0B;--gr:#10B981;
}
html,body{height:100%;background:var(--bg);color:var(--t1);overflow:hidden;font-family:var(--sans)}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh}
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(3,6,15,.9);backdrop-filter:blur(12px);z-index:10;position:relative}
#body{flex:1;display:grid;grid-template-columns:1fr 320px;overflow:hidden;min-height:0}
#globe-wrap{position:relative;overflow:hidden;background:radial-gradient(ellipse at 50% 40%,#040e24 0%,#020510 100%)}
#globe-canvas{display:block;width:100%;height:100%}
#sidebar{display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--border);background:rgba(0,0,0,.5)}

/* ── HEADER ── */
.h-logo{font-size:20px;font-weight:800;letter-spacing:-.04em;color:var(--t1)}
.h-logo em{font-style:normal;color:var(--corona)}
.h-live{display:flex;align-items:center;gap:7px;padding:4px 12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:100px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.15em;color:#EF4444;text-transform:uppercase}
.h-dot{width:6px;height:6px;border-radius:50%;background:#EF4444;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.h-stats{display:flex;gap:24px;align-items:center}
.h-stat{display:flex;flex-direction:column;align-items:center;gap:1px}
.h-stat-v{font-family:var(--sans);font-size:18px;font-weight:800;letter-spacing:-.03em;color:var(--t1);line-height:1}
.h-stat-v.red{color:var(--re);text-shadow:0 0 16px rgba(239,68,68,.4)}
.h-stat-l{font-family:var(--mono);font-size:7px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3)}

/* ── GLOBE CONTROLS ── */
#controls{position:absolute;bottom:20px;right:12px;display:flex;flex-direction:column;gap:5px;z-index:5}
.ctrl-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,.7);color:var(--t2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:all .15s}
.ctrl-btn:hover{border-color:var(--border-h);color:var(--corona)}
#globe-label{position:absolute;top:14px;left:14px;font-family:var(--mono);font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);background:rgba(0,0,0,.5);padding:4px 10px;border-radius:100px;border:1px solid var(--border)}

/* ── SIDEBAR ── */
.sb-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--corona);margin-bottom:2px}
.sb-sub{font-size:10px;color:var(--t2)}
#cards{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;scrollbar-width:thin;scrollbar-color:rgba(255,143,0,.12) transparent}
#cards::-webkit-scrollbar{width:3px}
#cards::-webkit-scrollbar-thumb{background:rgba(255,143,0,.12);border-radius:2px}

/* ── REGION CARD ── */
.rc{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 13px 9px;animation:rcIn .35s ease-out both;transition:border-color .15s,background .15s}
.rc:hover{border-color:var(--border-h);background:rgba(255,143,0,.03)}
@keyframes rcIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.rc-head{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.rc-em{font-size:12px;line-height:1}
.rc-name{font-size:11px;font-weight:700;color:var(--t1);flex:1}
.rc-trend{font-family:var(--mono);font-size:15px;font-weight:700;line-height:1}
.rc-bar{height:2px;background:rgba(255,255,255,.07);border-radius:2px;margin-bottom:7px;overflow:hidden}
.rc-bar-fill{height:100%;border-radius:2px;transition:width 1.2s ease}
.rc-summary{font-size:10px;color:var(--t2);line-height:1.6;margin-bottom:7px}
.rc-foot{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.rc-badge{font-family:var(--mono);font-size:7px;font-weight:700;letter-spacing:.07em;padding:2px 7px;border-radius:100px;text-transform:uppercase}
.rc-topics{font-family:var(--mono);font-size:7px;color:var(--t3);letter-spacing:.04em;text-transform:uppercase}

/* ── TICKER ── */
#ticker{border-top:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;background:rgba(0,0,0,.3);overflow:hidden}
.tk-lbl{font-family:var(--mono);font-size:7px;font-weight:700;letter-spacing:.18em;color:var(--corona);background:rgba(255,143,0,.09);padding:2px 7px;border-radius:3px;flex-shrink:0;text-transform:uppercase}
#tk-text{font-family:var(--mono);font-size:8px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── LOADER ── */
#loader{position:absolute;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .6s}
#loader.gone{opacity:0;pointer-events:none}
.ld-ring{width:44px;height:44px;border:2px solid rgba(255,143,0,.12);border-top-color:var(--corona);border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-txt{font-family:var(--mono);font-size:8px;letter-spacing:.2em;color:var(--t3);text-transform:uppercase}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  #body{grid-template-columns:1fr}
  #sidebar{border-left:none;border-top:1px solid var(--border);max-height:45vh}
}
@media(max-width:600px){
  #header{padding:8px 12px}
  .h-stat{display:none}
  .h-stat:nth-child(-n+2){display:flex}
}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="h-logo">World<em>Lens</em></div>
    <div class="h-stats" id="h-stats">
      <div class="h-stat"><div class="h-stat-v" id="st-ev">—</div><div class="h-stat-l">Events 24h</div></div>
      <div class="h-stat"><div class="h-stat-v red" id="st-hi">—</div><div class="h-stat-l">Critical</div></div>
      <div class="h-stat"><div class="h-stat-v" id="st-co">—</div><div class="h-stat-l">Countries</div></div>
      <div class="h-stat"><div class="h-stat-v" id="st-av">—</div><div class="h-stat-l">Avg Sev</div></div>
    </div>
    <div class="h-live"><div class="h-dot"></div>Live Intel</div>
  </div>
  <div id="body">
    <div id="globe-wrap">
      <div id="loader"><div class="ld-ring"></div><div class="ld-txt">Initialising Globe…</div></div>
      <div id="globe-label">⬡ 3D Live Globe</div>
      <canvas id="globe-canvas"></canvas>
      <div id="controls">
        <button class="ctrl-btn" id="btn-pause" title="Pause rotation">⏸</button>
        <button class="ctrl-btn" onclick="resetCamera()" title="Reset view">⊙</button>
      </div>
    </div>
    <div id="sidebar">
      <div class="sb-header">
        <div class="sb-title">⬡ AI Regional Briefings</div>
        <div class="sb-sub">Live · refreshes every 60s</div>
      </div>
      <div id="cards"><div style="padding:20px 0;text-align:center;font-family:var(--mono);font-size:8px;color:rgba(255,143,0,.3);letter-spacing:.15em">LOADING…</div></div>
      <div id="ticker"><span class="tk-lbl">Feed</span><span id="tk-text">Connecting…</span></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';
/* ══ CONFIG ══ */
var ROT=.0007, R=1.0, ATM=1.035;
var CATS={'CONFLICT':'#ef4444','SECURITY':'#dc2626','EARTHQUAKE':'#eab308','DISASTER':'#f97316','ECONOMICS':'#10b981','FINANCE':'#06b6d4','TECHNOLOGY':'#8b5cf6','ENERGY':'#f59e0b','HUMANITARIAN':'#fb923c','POLITICS':'#6366f1','GEOPOLITICS':'#3b82f6','HEALTH':'#ec4899'};
var rotating=true, scene, camera, renderer, globeMesh, mGroup, gGroup, rGroup;

/* ══ INIT ══ */
function init(){
  var canvas=document.getElementById('globe-canvas');
  var wrap=document.getElementById('globe-wrap');
  var W=wrap.clientWidth||window.innerWidth*.65, H=wrap.clientHeight||window.innerHeight*.85;

  renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true});
  renderer.setSize(W,H); renderer.setPixelRatio(Math.min(devicePixelRatio,2));

  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(42,W/H,.1,100);
  camera.position.z=2.75;

  /* Stars */
  var sg=new THREE.BufferGeometry(), sp=new Float32Array(5000*3);
  for(var i=0;i<5000;i++){var ph=Math.random()*Math.PI*2,th=Math.acos(2*Math.random()-1),r2=45+Math.random()*20;sp[i*3]=-r2*Math.sin(th)*Math.cos(ph);sp[i*3+1]=r2*Math.sin(th)*Math.sin(ph);sp[i*3+2]=r2*Math.cos(th);}
  sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:.032,transparent:true,opacity:.55})));

  /* Globe */
  var geo=new THREE.SphereGeometry(R,64,64);
  var mat=new THREE.MeshPhongMaterial({color:0x0a1628,emissive:0x010408,emissiveIntensity:.2,shininess:30,specular:0x1a3a6a});
  new THREE.TextureLoader().load('https://github.com/hakubox/ThreeJSEditor/blob/master/examples/textures/planets/earth_atmos_2048.jpg',function(t){mat.map=t;mat.needsUpdate=true;},null,null);
  globeMesh=new THREE.Mesh(geo,mat);
  scene.add(globeMesh);
  globeMesh.rotation.z=.41;

  /* Grid */
  var gm=new THREE.MeshBasicMaterial({color:0x1e3a5f,transparent:true,opacity:.07,wireframe:true});
  var gms=new THREE.Mesh(new THREE.SphereGeometry(R+.001,36,18),gm);
  gms.rotation.z=.41; scene.add(gms);

  /* Atmosphere */
  var am=new THREE.ShaderMaterial({
    vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',
    fragmentShader:'varying vec3 vN;void main(){float i=pow(.65-dot(vN,vec3(0,0,1.)),3.);gl_FragColor=vec4(.15,.45,1.,1.)*i;}',
    blending:THREE.AdditiveBlending,side:THREE.BackSide,transparent:true
  });
  var atm=new THREE.Mesh(new THREE.SphereGeometry(ATM,64,64),am);
  atm.rotation.z=.41; scene.add(atm);

  /* Groups */
  mGroup=new THREE.Group(); mGroup.rotation.z=.41;
  gGroup=new THREE.Group(); gGroup.rotation.z=.41;
  rGroup=new THREE.Group(); rGroup.rotation.z=.41;
  scene.add(mGroup,gGroup,rGroup);

  /* Lights */
  scene.add(new THREE.AmbientLight(0x223355,.7));
  var sun=new THREE.DirectionalLight(0x6699ff,1.3); sun.position.set(5,3,5); scene.add(sun);

  /* Resize */
  window.addEventListener('resize',function(){
    var w2=wrap.clientWidth||window.innerWidth*.65, h2=wrap.clientHeight||window.innerHeight*.85;
    camera.aspect=w2/h2; camera.updateProjectionMatrix(); renderer.setSize(w2,h2);
  });

  document.getElementById('btn-pause').onclick=function(){rotating=!rotating;this.textContent=rotating?'⏸':'▶';};

  requestAnimationFrame(loop);
  /* Remove loader */
  setTimeout(function(){var ld=document.getElementById('loader');if(ld)ld.classList.add('gone');},1800);
}
window.resetCamera=function(){camera.position.set(0,0,2.75);};

/* ══ LOOP ══ */
function loop(){
  requestAnimationFrame(loop);
  var t=Date.now()/1000;
  if(rotating){globeMesh.rotation.y+=ROT;mGroup.rotation.y+=ROT;gGroup.rotation.y+=ROT;rGroup.rotation.y+=ROT;}
  gGroup.children.forEach(function(m){var b=m.userData.b||0;m.material.opacity=.08+.07*Math.sin(t*2+b);m.scale.setScalar(1+.2*Math.sin(t*1.5+b));});
  rGroup.children.forEach(function(m){if(!m.userData.reg)return;var b=m.userData.b||0,s=m.userData.s||1;m.scale.setScalar(s*(1+.15*Math.sin(t*1.8+b)));});
  renderer.render(scene,camera);
}

/* ══ GEO HELPERS ══ */
function ll2v(lat,lon,r){
  var ph=(90-lat)*Math.PI/180, th=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph),r*Math.sin(ph)*Math.sin(th));
}
function hex2c(h){var n=parseInt(h.replace('#',''),16);return new THREE.Color((n>>16&255)/255,(n>>8&255)/255,(n&255)/255);}

/* ══ BUILD MARKERS ══ */
function buildMarkers(pts){
  while(mGroup.children.length)mGroup.remove(mGroup.children[0]);
  while(gGroup.children.length)gGroup.remove(gGroup.children[0]);
  pts.slice(0,250).forEach(function(p){
    var lat=+p.latitude,lon=+p.longitude;
    if(isNaN(lat)||isNaN(lon))return;
    var sev=+p.severity||5, col=CATS[p.category]||'#60a5fa', c=hex2c(col), r=.003+sev*.0025;
    var pos=ll2v(lat,lon,R+.003);
    var m=new THREE.Mesh(new THREE.SphereGeometry(r,7,7),new THREE.MeshBasicMaterial({color:c}));
    m.position.copy(pos); mGroup.add(m);
    if(sev>=6){
      var h=new THREE.Mesh(new THREE.SphereGeometry(r*3.5,7,7),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:.1}));
      h.position.copy(pos); h.userData={b:Math.random()*Math.PI*2}; gGroup.add(h);
    }
  });
}

/* ══ BUILD REGION BEACONS ══ */
function buildRegionBeacons(regions){
  while(rGroup.children.length)rGroup.remove(rGroup.children[0]);
  regions.forEach(function(reg){
    if(!reg.center||!reg.event_count)return;
    var pos=ll2v(reg.center[0],reg.center[1],R+.006);
    var col=hex2c(reg.color||'#3b82f6');
    var sc=Math.min(1+reg.event_count*.05,4);
    var m=new THREE.Mesh(new THREE.SphereGeometry(.013*sc,10,10),new THREE.MeshBasicMaterial({color:col}));
    m.position.copy(pos); m.userData={reg:reg.name,b:Math.random()*Math.PI*2,s:sc}; rGroup.add(m);
    var ring=new THREE.Mesh(new THREE.RingGeometry(.018*sc,.023*sc,20),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.3,side:THREE.DoubleSide}));
    ring.position.copy(pos); ring.lookAt(new THREE.Vector3(0,0,0)); rGroup.add(ring);
  });
}

/* ══ DOM: REGION CARDS ══ */
function renderCards(regions){
  var el=document.getElementById('cards'); if(!el)return;
  var sc={'critical':'#ef4444','negative':'#f97316','neutral':'#94a3b8','positive':'#10b981'};
  var tc={'↑':'#ef4444','→':'#f59e0b','↓':'#10b981'};
  el.innerHTML=regions.map(function(r,i){
    var rw=Math.min(100,(r.risk/10)*100).toFixed(0);
    var rc=r.risk>=7?'#ef4444':r.risk>=5?'#f59e0b':'#10b981';
    var tc2=tc[r.trend]||'#94a3b8';
    return '<div class="rc" style="border-left:3px solid '+r.color+';animation-delay:'+(i*.04)+'s">'+
      '<div class="rc-head"><span class="rc-em">'+r.emoji+'</span><span class="rc-name">'+r.name+'</span><span class="rc-trend" style="color:'+tc2+'">'+r.trend+'</span></div>'+
      '<div class="rc-bar"><div class="rc-bar-fill" style="width:'+rw+'%;background:'+rc+'"></div></div>'+
      '<div class="rc-summary">'+r.summary+'</div>'+
      '<div class="rc-foot"><span class="rc-badge" style="background:'+r.color+'1a;color:'+r.color+'">'+r.event_count+' events</span>'+
      (r.high_impact?'<span class="rc-badge" style="background:rgba(239,68,68,.1);color:#ef4444">'+r.high_impact+' critical</span>':'')+
      (r.topics&&r.topics.length?'<span class="rc-topics">'+r.topics.slice(0,2).join(' · ')+'</span>':'')+
      '</div></div>';
  }).join('');
}

/* ══ DOM: STATS ══ */
function renderStats(s){
  var set=function(id,v){var el=document.getElementById(id);if(el)el.textContent=v;};
  set('st-ev',s.events_24h||'—'); set('st-hi',s.high_impact||'—');
  set('st-co',s.countries_affected||'—'); set('st-av',s.avg_severity?s.avg_severity.toFixed(1):'—');
}

/* ══ TICKER ══ */
var _tkItems=[], _tkIdx=0;
function updateTicker(regions){
  _tkItems=[];
  regions.forEach(function(r){if(r.top_events&&r.top_events[0])_tkItems.push(r.emoji+' '+r.name+': '+r.top_events[0].title.slice(0,55));});
  if(!_tkItems.length)return;
  nextTick();
}
function nextTick(){
  var el=document.getElementById('tk-text'); if(!el||!_tkItems.length)return;
  el.textContent=_tkItems[_tkIdx%_tkItems.length]; _tkIdx++;
  setTimeout(nextTick,5000);
}

/* ══ FETCH ══ */
function apiFetch(url,cb){fetch(url).then(function(r){return r.ok?r.json():null;}).then(function(d){if(d)cb(d);}).catch(function(){});}

function loadAll(){
  apiFetch('/api/globe/heatmap-points',buildMarkers);
  apiFetch('/api/globe/regions',function(d){buildRegionBeacons(d);renderCards(d);updateTicker(d);});
  apiFetch('/api/globe/stats',renderStats);
}

/* ══ BOOT ══ */
init();
loadAll();
setInterval(function(){apiFetch('/api/globe/heatmap-points',buildMarkers);},30000);
setInterval(function(){apiFetch('/api/globe/regions',function(d){buildRegionBeacons(d);renderCards(d);updateTicker(d);});},60000);
setInterval(function(){apiFetch('/api/globe/stats',renderStats);},15000);
})();
</script>
</body>
</html>
